<svg width="340" height="140" viewBox="0 0 340 140" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMid meet">

  <!-- Stripe 1: darkest purple -->
  <polygon points="52,30 76,30 52,170 28,170" fill="#3a006e"/>
  <!-- Stripe 2: mid purple -->
  <polygon points="84,30 108,30 84,170 60,170" fill="#6030b0"/>
  <!-- Stripe 3: white -->
  <polygon points="116,30 140,30 116,170 92,170" fill="#ffffff"/>

  <!-- Vertical divider -->
  <line x1="162" y1="20" x2="162" y2="180" stroke="#4b0082" stroke-width="1.5"/>

  <!-- MK — Arial Black, no external font dependency -->
  <text x="182" y="145"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="110"
        font-weight="900"
        fill="#ffffff"
        letter-spacing="-2">MK</text>

  <!-- DETAILING — spaced caps, same font family, purple -->
  <text x="186" y="175"
        font-family="Arial, sans-serif"
        font-size="18"
        font-weight="400"
        fill="#7b35cc"
        letter-spacing="6">DETAILING</text>

</svg>
